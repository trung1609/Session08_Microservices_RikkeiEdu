spring:
  application:
    name: doctor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/doctor_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  ratelimiter:
    instances:
      searchDoctorLimit:
        limit-for-period: 5
        limit-refresh-period: 10s
        timeout-duration: 0s

  timelimiter:
    instances:
        searchDoctorTimeLimit:
            timeout-duration: 1s